<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz La Conjugaison au Présent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003057; /* Bleu Marine Management */
            --accent: #00A9CE; /* Bleu Azur */
            --success: #27AE60;
            --error: #E74C3C;
            --bg: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #E2E8F0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-card {
            background: white;
            width: 95%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 40px;
            box-sizing: border-box;
        }

        /* Barre de progression */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #EDF2F7;
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Zone Question et Instructions */
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 28px;
            margin: 0 0 10px 0;
        }

        .instruction-text {
            font-size: 15px;
            color: #475569;
            font-style: italic;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .question-box {
            background: var(--bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 5px;
        }

        /* Indication de traduction interactive */
        .translation-hint {
            display: inline-block;
            margin-top: 8px;
            font-size: 14px;
            color: #64748B;
            cursor: pointer;
            text-decoration: underline dotted;
            user-select: none;
            transition: color 0.2s;
        }
        
        .translation-hint:hover {
            color: var(--accent);
        }

        /* Boutons d'options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-btn {
            background: white;
            border: 2px solid #E2E8F0;
            padding: 18px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #F0F9FF;
        }

        .option-btn.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }

        .option-btn.incorrect {
            background-color: #FEE2E2;
            border-color: var(--error);
            color: #991B1B;
        }

        /* Feedback */
        .feedback {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            display: none;
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        .next-btn:hover { 
            background: #002340;
        }

        /* Ecran Final */
        #result-screen { 
            text-align: center;
            display: none; 
        }
        .score-big { 
            font-size: 64px; 
            color: var(--primary); 
            font-weight: 800;
            margin: 20px 0; 
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="quiz-ui">
        <div class="header">
            <span id="q-count" style="font-weight: 600; color: #64748B;">Question 1/20</span>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            <span id="score-count" style="font-weight: 600; color: var(--primary);">Score: 0</span>
        </div>

        <h1>Le Présent de l'Indicatif</h1>
        <div class="instruction-text" id="instruction-text">Choose the correct verb form for the blank space.</div>
        
        <div class="question-box">
            <div class="question-text" id="q-text">Chargement...</div>
            <div class="translation-hint" id="q-trans" onclick="toggleTranslation()">👁 Show translation</div>
        </div>

        <div class="options-grid" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>

    <div id="result-screen">
        <h1 id="res-title">Quiz Terminé !</h1>
        <div class="score-big" id="final-score">0 / 20</div>
        <p id="res-comment" style="font-size: 18px; margin-bottom: 30px;"></p>
        <button class="next-btn" style="display:block;" onclick="location.reload()">Recommencer / Restart</button>
    </div>
</div>

<script>
    // Banque de 40 questions sur les conjugaisons au présent
    const allQuestions = [
        // --- 1ER GROUPE (-ER) ---
        { q: "Nous _______ (parler) français.", inst: "Choose the correct conjugation for this 1st group verb (-ER):", t: "We speak French.", o: ["parlons", "parlez", "parlent", "parles"], a: 0 },
        { q: "J'_______ (habiter) à Paris.", inst: "Choose the correct conjugation for this 1st group verb (-ER):", t: "I live in Paris.", o: ["habite", "habites", "habitons", "habitez"], a: 0 },
        { q: "Tu _______ (manger) une pomme.", inst: "Choose the correct conjugation for this 1st group verb (-ER):", t: "You are eating an apple.", o: ["manges", "mange", "mangeons", "mangez"], a: 0 },
        { q: "Nous _______ (commencer) la leçon.", inst: "Watch out for the stem spelling with 'Nous' (1st group):", t: "We are starting the lesson.", o: ["commençons", "commencons", "commencez", "commencent"], a: 0 },
        { q: "Nous _______ (manger) ensemble.", inst: "Watch out for the stem spelling with 'Nous' (1st group):", t: "We eat together.", o: ["mangeons", "mangons", "mangez", "mangent"], a: 0 },
        { q: "Ils _______ (appeler) le médecin.", inst: "Watch out for the double consonant in the stem (1st group):", t: "They are calling the doctor.", o: ["appellent", "appelent", "appelons", "appelez"], a: 0 },
        { q: "Je _______ (préférer) le café.", inst: "Watch out for the accent change in the stem (1st group):", t: "I prefer coffee.", o: ["préfère", "preferre", "préfères", "préférons"], a: 0 },
        { q: "Vous _______ (étudier) beaucoup.", inst: "Choose the correct conjugation for this 1st group verb (-ER):", t: "You study a lot.", o: ["étudiez", "étudies", "étudie", "étudient"], a: 0 },
        { q: "Elles _______ (regarder) un film.", inst: "Choose the correct conjugation for this 1st group verb (-ER):", t: "They are watching a movie.", o: ["regardent", "regarde", "regardes", "regardez"], a: 0 },
        { q: "Tu _______ (payer) l'addition.", inst: "Watch out for the optional vowel change Y to I (1st group):", t: "You pay the bill.", o: ["paies", "payes", "paie", "payez"], a: 0 },

        // --- 2E GROUPE (-IR en -issant) ---
        { q: "Je _______ (finir) mes devoirs.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "I am finishing my homework.", o: ["finis", "finit", "finissons", "finissent"], a: 0 },
        { q: "Vous _______ (choisir) un gâteau.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "You choose a cake.", o: ["choisissez", "choisit", "choisissent", "choisissons"], a: 0 },
        { q: "Elle _______ (rougir) facilement.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "She blushes easily.", o: ["rougit", "rougis", "rougissent", "rougissons"], a: 0 },
        { q: "Les enfants _______ (grandir) vite.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "Children grow up fast.", o: ["grandissent", "grandit", "grandis", "grandissez"], a: 0 },
        { q: "Nous _______ (réussir) l'examen.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "We pass the exam.", o: ["réussissons", "réussissez", "réussit", "réussissent"], a: 0 },
        { q: "Tu _______ (remplir) le verre.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "You fill the glass.", o: ["remplis", "remplit", "remplissez", "remplissons"], a: 0 },
        { q: "Le joueur _______ (réagir) bien.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "The player reacts well.", o: ["réagit", "réagis", "réagissent", "réagissez"], a: 0 },
        { q: "Vous _______ (réfléchir) à la question.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "You are thinking about the question.", o: ["réfléchissez", "réfléchit", "réfléchis", "réfléchissent"], a: 0 },
        { q: "Nous _______ (punir) le comportement.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "We punish the behavior.", o: ["punissons", "punissez", "punit", "punissent"], a: 0 },
        { q: "Ils _______ (obéir) aux règles.", inst: "Choose the correct conjugation for this 2nd group verb (-IR):", t: "They obey the rules.", o: ["obéissent", "obéit", "obéissons", "obéissez"], a: 0 },

        // --- 3E GROUPE (Irréguliers & Verbes plus avancés) ---
        { q: "Je _______ (être) fatigué aujourd'hui.", inst: "Conjugate this essential irregular verb (3rd group):", t: "I am tired today.", o: ["suis", "es", "est", "sommes"], a: 0 },
        { q: "Tu _______ (avoir) quel âge ?", inst: "Conjugate this essential irregular verb (3rd group):", t: "How old are you?", o: ["as", "ai", "a", "avez"], a: 0 },
        { q: "Il _______ (aller) à la gare.", inst: "Conjugate this irregular verb (an exception ending in -ER, 3rd group):", t: "He goes to the station.", o: ["va", "vais", "vont", "allez"], a: 0 },
        { q: "Nous _______ (faire) du sport.", inst: "Conjugate this frequent irregular verb (3rd group):", t: "We do sports.", o: ["faisons", "faites", "font", "fais"], a: 0 },
        { q: "Vous _______ (dire) la vérité.", inst: "Conjugate this frequent irregular verb (3rd group):", t: "You tell the truth.", o: ["dites", "disons", "disez", "disent"], a: 0 },
        { q: "Ils _______ (prendre) le train.", inst: "Conjugate this irregular verb (3rd group):", t: "They take the train.", o: ["prennent", "prenent", "prend", "prenons"], a: 0 },
        { q: "Tu _______ (pouvoir) m'aider ?", inst: "Conjugate this irregular modal verb (3rd group):", t: "Can you help me?", o: ["peux", "peut", "pouvons", "pouvez"], a: 0 },
        { q: "Je _______ (vouloir) un café s'il vous plaît.", inst: "Conjugate this irregular modal verb (3rd group):", t: "I want a coffee please.", o: ["veux", "veut", "voulons", "veulent"], a: 0 },
        { q: "Elle _______ (venir) demain.", inst: "Conjugate this irregular verb (3rd group):", t: "She is coming tomorrow.", o: ["vient", "viens", "venons", "viennent"], a: 0 },
        { q: "Cet objet _______ (appartenir) au musée.", inst: "Conjugate this advanced verb belonging to the Venir/Tenir family (3rd group):", t: "This object belongs to the museum.", o: ["appartient", "appartiens", "appartiennent", "appartenons"], a: 0 },
        { q: "Vous _______ (permettre) cette action ?", inst: "Conjugate this advanced verb belonging to the Mettre family (3rd group):", t: "Do you allow this action?", o: ["permettez", "permet", "permettons", "permettent"], a: 0 },
        { q: "Ils _______ (comprendre) la leçon.", inst: "Conjugate this advanced verb belonging to the Prendre family (3rd group):", t: "They understand the lesson.", o: ["comprennent", "comprenent", "comprend", "comprenez"], a: 0 },
        { q: "Tu _______ (promettre) d'arriver à l'heure ?", inst: "Conjugate this advanced verb belonging to the Mettre family (3rd group):", t: "Do you promise to arrive on time?", o: ["promets", "promet", "promettons", "promettez"], a: 0 },
        { q: "Nous _______ (découvrir) une belle ville.", inst: "Conjugate this advanced verb belonging to the Ouvrir/Offrir family (3rd group):", t: "We discover a beautiful city.", o: ["découvrons", "découvre", "découvrez", "découvrent"], a: 0 },
        { q: "Je _______ (offrir) un cadeau à mon ami.", inst: "Conjugate this irregular verb (3rd group):", t: "I offer a gift to my friend.", o: ["offre", "offres", "offrons", "offrez"], a: 0 },
        { q: "Les fleurs _______ (éclore) au printemps.", inst: "Conjugate this advanced irregular verb (3rd group):", t: "Flowers bloom in spring.", o: ["éclosent", "éclôt", "éclosons", "éclos"], a: 0 },
        { q: "Vous _______ (craindre) le froid ?", inst: "Conjugate this advanced irregular verb (3rd group):", t: "Do you fear the cold?", o: ["craignez", "crains", "craint", "craignent"], a: 0 },
        { q: "Nous _______ (résoudre) ce problème.", inst: "Conjugate this advanced irregular verb (3rd group):", t: "We solve this problem.", o: ["résolvons", "résolvez", "résout", "résolvent"], a: 0 },
        { q: "Il _______ (valoir) mieux partir maintenant.", inst: "Conjugate this advanced irregular verb (3rd group):", t: "It is better to leave now.", o: ["vaut", "vaux", "valons", "valent"], a: 0 },
        { q: "Tu _______ (lire) un roman intéressant.", inst: "Conjugate this irregular verb (3rd group):", t: "You are reading an interesting novel.", o: ["lis", "lit", "lisons", "lisez"], a: 0 }
    ];

    let quizQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let translationVisible = false;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function initQuiz() {
        let pool = JSON.parse(JSON.stringify(allQuestions));
        shuffleArray(pool); 
        quizQuestions = pool.slice(0, 20); 
        currentIdx = 0;
        score = 0;
        loadQ();
    }

    function loadQ() {
        const qData = quizQuestions[currentIdx];
        
        // Change l'instruction au-dessus du bloc de la question en anglais
        document.getElementById('instruction-text').innerText = qData.inst;
        document.getElementById('q-text').innerText = qData.q;
        
        translationVisible = false;
        document.getElementById('q-trans').innerText = "👁 Show translation";
        document.getElementById('q-trans').style.color = "#64748B";

        document.getElementById('q-count').innerText = `Question ${currentIdx + 1}/20`;
        document.getElementById('p-bar').style.width = ((currentIdx + 1) / 20 * 100) + "%";
        
        const correctText = qData.o[qData.a];
        
        let optionsMapped = qData.o.map((opt, index) => {
            return { text: opt, isCorrect: index === qData.a };
        });
        
        shuffleArray(optionsMapped);

        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        
        optionsMapped.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => check(opt.isCorrect, btn, correctText);
            optCont.appendChild(btn);
        });
        
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function toggleTranslation() {
        const qData = quizQuestions[currentIdx];
        const transElement = document.getElementById('q-trans');
        if (!translationVisible) {
            transElement.innerText = `Meaning: "${qData.t}"`;
            transElement.style.color = "var(--accent)";
            translationVisible = true;
        } else {
            transElement.innerText = "👁 Show translation";
            transElement.style.color = "#64748B";
            translationVisible = false;
        }
    }

    function check(isCorrect, btn, correctText) {
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        const f = document.getElementById('feedback');
        f.style.display = 'block';

        const qData = quizQuestions[currentIdx];
        document.getElementById('q-trans').innerText = `Meaning: "${qData.t}"`;
        document.getElementById('q-trans').style.color = "var(--accent)";
        translationVisible = true;

        if(isCorrect) {
            btn.classList.add('correct');
            f.innerText = "Excellent ! Correct. ✅";
            f.style.color = "var(--success)";
            score++;
            document.getElementById('score-count').innerText = "Score: " + score;
        } else {
            btn.classList.add('incorrect');
            all.forEach(b => {
                if(b.innerText === correctText) b.classList.add('correct');
            });
            f.innerText = "Dommage ! La réponse était : " + correctText + " ❌";
            f.style.color = "var(--error)";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 20) loadQ();
        else showRes();
    }

    function showRes() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score + " / 20";
        const comm = document.getElementById('res-comment');
        
        if(score === 20) comm.innerHTML = "Parfait ! Vous maîtrisez les pièges et les groupes de la conjugaison française sur le bout des doigts.<br><i>Perfect! You have a flawless mastery of French conjugations.</i>";
        else if(score >= 14) comm.innerHTML = "Très bien ! Bon travail sur les différents verbes et irrégularités.<br><i>Great job! Good command over verbs and irregularities.</i>";
        else comm.innerHTML = "Continuez d'apprendre et de pratiquer la conjugaison des 3 groupes !<br><i>Keep learning and practicing conjugations!</i>";
    }

    initQuiz();
</script>

</body>
</html>
